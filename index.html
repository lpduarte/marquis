<!DOCTYPE html>
<html lang="pt" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Marquis</title>
  <meta name="theme-color" content="#fafafa" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#1a1a1a" media="(prefers-color-scheme: dark)">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="icon" type="image/png" sizes="192x192" href="favicon-light.png" media="(prefers-color-scheme: light)">
  <link rel="icon" type="image/png" sizes="192x192" href="favicon-dark.png" media="(prefers-color-scheme: dark)">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Literata:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Drop zone / Welcome screen -->
  <div id="welcome" class="welcome">
    <div class="welcome-content">
      <h1 class="title"><span class="title-cap"><svg class="title-dots" viewBox="0 0 64 14" aria-hidden="true" focusable="false"><circle cx="20" cy="10" r="3.5"/><circle cx="32" cy="7" r="5.5"/><circle cx="44" cy="10" r="3.5"/></svg>M</span>arquis</h1>
      <p class="welcome-tagline">Devolve o monospace às máquinas.</p>
      <p class="welcome-prompt"><span class="only-pointer">Arrasta um <code>.md</code> para aqui, ou </span><button type="button" id="open-btn" class="link-btn"><span class="only-pointer">abre um ficheiro</span><span class="only-touch">Toca para abrir um ficheiro <code>.md</code></span></button><span class="only-pointer">.</span></p>
      <input type="file" id="file-input" accept=".md,.markdown,.txt" hidden>
      <p id="welcome-msg" class="welcome-msg" role="status" aria-live="polite"></p>
    </div>
    <p class="welcome-footer"><a href="https://github.com/lpduarte/marquis" target="_blank" rel="noopener">open source →</a></p>
  </div>

  <!-- Reading view -->
  <div id="reader" class="reader hidden">
    <article id="content" class="content" tabindex="-1"></article>
  </div>

  <!-- Floating controls (hidden until tap/click) -->
  <div id="controls" class="controls" inert>
    <div class="controls-bar">
      <button id="btn-back" class="ctrl-btn" aria-label="Voltar" title="Voltar">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
          <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
      </button>

      <div class="ctrl-group">
        <button class="ctrl-btn theme-btn" data-theme="light" aria-label="Tema claro" title="Claro">
          <span class="theme-dot dot-light"></span>
        </button>
        <button class="ctrl-btn theme-btn" data-theme="sepia" aria-label="Tema sépia" title="Sépia">
          <span class="theme-dot dot-sepia"></span>
        </button>
        <button class="ctrl-btn theme-btn" data-theme="dark" aria-label="Tema escuro" title="Escuro">
          <span class="theme-dot dot-dark"></span>
        </button>
      </div>
    </div>
  </div>

  <!-- Progress bar — always visible while reading -->
  <div class="progress-track" role="progressbar" aria-label="Progresso de leitura" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
    <div id="progress-bar" class="progress-bar"></div>
  </div>

  <script
    src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"
    integrity="sha384-/TQbtLCAerC3jgaim+N78RZSDYV7ryeoBCVqTuzRrFec2akfBkHS7ACQ3PQhvMVi"
    crossorigin="anonymous"></script>
  <script
    src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"
    integrity="sha384-+VfUPEb0PdtChMwmBcBmykRMDd+v6D/oFmB3rZM/puCMDYcIvF968OimRh4KQY9a"
    crossorigin="anonymous"></script>
  <script src="app.js"></script>
</body>
</html>
