<!DOCTYPE html>
<html lang="pt" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marquis</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Literata:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Drop zone / Welcome screen -->
  <div id="welcome" class="welcome">
    <div class="welcome-content">
      <h1 class="title"><span class="title-cap"><svg class="title-dots" viewBox="0 0 64 14" aria-hidden="true" focusable="false"><circle cx="20" cy="10" r="3.5"/><circle cx="32" cy="7" r="5.5"/><circle cx="44" cy="10" r="3.5"/></svg>M</span>arquis</h1>
      <p>Arrasta um ficheiro <code>.md</code> para aqui</p>
      <p class="welcome-or">ou</p>
      <button id="open-btn" class="open-btn">Abre um ficheiro</button>
      <input type="file" id="file-input" accept=".md,.markdown,.txt" hidden>
      <p id="welcome-msg" class="welcome-msg" role="status" aria-live="polite"></p>
    </div>
  </div>

  <!-- Reading view -->
  <div id="reader" class="reader hidden">
    <article id="content" class="content"></article>
  </div>

  <!-- Floating controls (hidden until tap/click) -->
  <div id="controls" class="controls">
    <div class="controls-bar">
      <button id="btn-back" class="ctrl-btn" aria-label="Voltar" title="Voltar">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
      </button>

      <div class="ctrl-group">
        <button id="btn-font-down" class="ctrl-btn" aria-label="Diminuir fonte" title="Diminuir fonte">A-</button>
        <button id="btn-font-up" class="ctrl-btn" aria-label="Aumentar fonte" title="Aumentar fonte">A+</button>
      </div>

      <div class="ctrl-group">
        <button class="ctrl-btn theme-btn" data-theme="light" aria-label="Tema claro" title="Claro">
          <span class="theme-dot dot-light"></span>
        </button>
        <button class="ctrl-btn theme-btn" data-theme="sepia" aria-label="Tema sépia" title="Sépia">
          <span class="theme-dot dot-sepia"></span>
        </button>
        <button class="ctrl-btn theme-btn" data-theme="dark" aria-label="Tema escuro" title="Escuro">
          <span class="theme-dot dot-dark"></span>
        </button>
      </div>
    </div>

    <!-- Progress bar -->
    <div class="progress-track">
      <div id="progress-bar" class="progress-bar"></div>
    </div>
  </div>

  <script
    src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"
    integrity="sha384-/TQbtLCAerC3jgaim+N78RZSDYV7ryeoBCVqTuzRrFec2akfBkHS7ACQ3PQhvMVi"
    crossorigin="anonymous"></script>
  <script
    src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"
    integrity="sha384-+VfUPEb0PdtChMwmBcBmykRMDd+v6D/oFmB3rZM/puCMDYcIvF968OimRh4KQY9a"
    crossorigin="anonymous"></script>
  <script src="app.js"></script>
</body>
</html>
